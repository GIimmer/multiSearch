<div class="panel">
  <div class="header">
    <span class="title">MULTISEARCH</span>
    <label class="sync-toggle" title="Synchronize search across new pages">
      <input type="checkbox" class="sync-checkbox" />
      <span class="sync-slider"></span>
      <span class="sync-label">Cross-page</span>
    </label>
  </div>
  <div class="rows"></div>
  <div class="actions">
    <button class="add-btn">+ Add Term</button>
    <button class="clear-btn">Clear All</button>
    <button class="close-btn">Close</button>
  </div>
</div>
